require:
  - rubocop-capybara
  - rubocop-factory_bot
  - rubocop-rails
  - rubocop-rspec

AllCops:
  NewCops: enable

Layout/LineLength:
  Exclude:
  - 'db/**/*'

Lint/UnusedMethodArgument:
  Exclude:
    - 'lib/spiders/**/*'

Metrics/AbcSize:
  CountRepeatedAttributes: false
  Max: 18
  Exclude:
    - 'db/**/*'

Metrics/BlockLength:
  Exclude:
    - 'config/**/*'

Metrics/MethodLength:
  Max: 15
  Exclude:
    - 'db/**/*'

RSpec/AnyInstance:
  Enabled: false

RSpec/ExampleLength:
  Max: 10
  Exclude:
    - 'spec/views/**/*'

RSpec/IndexedLet:
  Enabled: false

RSpec/MessageSpies:
  EnforcedStyle: receive

RSpec/MultipleExpectations:
  Max: 10
  Exclude:
    - 'spec/views/**/*'

RSpec/MultipleMemoizedHelpers:
  Enabled: false

RSpec/NamedSubject:
  Enabled: false

RSpec/NestedGroups:
  Max: 5

RSpec/SubjectStub:
  Enabled: false

Style/Documentation:
  Enabled: false

Style/FrozenStringLiteralComment:
  Exclude:
    - 'Gemfile'
    - 'Rakefile'
    - 'config.ru'
    - 'config/**/*'
    - 'db/**/*'
